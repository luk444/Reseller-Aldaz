# Next.js 14 (App Router + API routes) en Netlify
# https://docs.netlify.com/frameworks/next-js/overview/

[build]
  command = "npm run build"

# No establecer "publish" manualmente: el plugin inyecta el runtime correcto.

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
