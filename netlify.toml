# Next.js 14 (App Router + API routes) en Netlify
# https://docs.netlify.com/frameworks/next-js/overview/

[build]
  command = "npm run build"
  # Debe ser un subdirectorio distinto de la raíz: si en el panel de Netlify
  # tienes "Publish directory" = / o vacío interpretado como repo, el plugin falla
  # con "publish directory cannot be the same as the base directory".
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
